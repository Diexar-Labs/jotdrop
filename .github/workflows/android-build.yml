name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: android

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache stable debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      # Release-variant (R8-geminificeerd): debug-builds van Compose scrollen
      # merkbaar slechter. Gesigneerd met dezelfde gecommite keystore, dus
      # updates installeren gewoon over oudere (debug-)installaties heen.
      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk artifacts/jotdrop.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jotdrop
          path: android/artifacts/jotdrop.apk
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/artifacts/jotdrop.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
